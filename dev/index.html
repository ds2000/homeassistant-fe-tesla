<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tesla Card — Dev Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      font-family: system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px 16px;
    }
    h1 { color: rgba(255,255,255,0.4); font-size: 0.8em; letter-spacing: 0.1em; text-transform: uppercase; }
    #card-container { width: 100%; max-width: 380px; }
    .toolbar {
      display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
      max-width: 420px;
    }
    .toolbar-section {
      display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
      width: 100%; max-width: 420px;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 8px; margin-top: 2px;
    }
    .toolbar-section:first-child { border-top: none; padding-top: 0; margin-top: 0; }
    .toolbar-label {
      width: 100%; text-align: center;
      font-size: 0.62em; color: rgba(255,255,255,0.25);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .toolbar button, .toolbar-section button {
      padding: 5px 10px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07); color: #fff;
      font-size: 0.7em; cursor: pointer;
      transition: background 0.1s ease;
    }
    .toolbar button:hover, .toolbar-section button:hover {
      background: rgba(255,255,255,0.15);
    }
    .toolbar button:active, .toolbar-section button:active {
      background: rgba(255,255,255,0.25);
    }
    .toolbar-section button.toggled-on {
      background: rgba(232,33,39,0.25); border-color: #e82127; color: #e82127;
    }
    #log {
      width: 100%; max-width: 380px;
      font-family: monospace; font-size: 0.72em;
      display: flex; flex-direction: column; gap: 2px;
    }
    #log .ok   { color: #2ecc71; }
    #log .err  { color: #e74c3c; white-space: pre-wrap; }
    #log .info { color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>

<h1>Tesla Card — Dev Preview</h1>

<!-- ── Core toggles ── -->
<div class="toolbar">
  <button onclick="toggle('charging')">Charging</button>
  <button onclick="toggle('locked')">Lock</button>
  <button onclick="toggle('online')">Online</button>
  <button onclick="toggle('plugged')">Plugged In</button>
  <button onclick="location.reload()">Reload</button>
</div>

<!-- ── Doors / openings ── -->
<div class="toolbar-section">
  <span class="toolbar-label">Openings</span>
  <button onclick="toggle('frunk')">Frunk</button>
  <button onclick="toggle('trunk')">Trunk</button>
  <button onclick="toggle('charger_door')">Charger Door</button>
  <button onclick="toggle('windows')">Windows</button>
</div>

<!-- ── Individual doors ── -->
<div class="toolbar-section">
  <span class="toolbar-label">Doors (near=driver, far=passenger in offcharge view)</span>
  <button id="btn-door-nf" onclick="toggle('door_nf')">NF (Driver Front)</button>
  <button id="btn-door-nr" onclick="toggle('door_nr')">NR (Driver Rear)</button>
  <button id="btn-door-ff" onclick="toggle('door_ff')">FF (Pass. Front)</button>
  <button id="btn-door-fr" onclick="toggle('door_fr')">FR (Pass. Rear)</button>
</div>

<!-- ── Climate ── -->
<div class="toolbar-section">
  <span class="toolbar-label">Climate</span>
  <button onclick="toggle('hvac')">HVAC On/Off</button>
  <button onclick="toggle('defrost')">Defrost</button>
  <button onclick="toggle('camp')">Camp Mode</button>
  <button onclick="toggle('dog')">Dog Mode</button>
</div>

<!-- ── Seat warmers ── -->
<div class="toolbar-section">
  <span class="toolbar-label">Seat Warmers (cycles Off → Low → Med → High)</span>
  <button onclick="cycleSeat('left')">Driver</button>
  <button onclick="cycleSeat('right')">Passenger</button>
  <button onclick="cycleSeat('rear_left')">Rear L</button>
  <button onclick="cycleSeat('rear_center')">Rear C</button>
  <button onclick="cycleSeat('rear_right')">Rear R</button>
</div>

<!-- ── Misc ── -->
<div class="toolbar-section">
  <span class="toolbar-label">Other</span>
  <button onclick="toggle('sentry')">Sentry</button>
  <button onclick="toggle('parking')">Parking Brake</button>
  <button onclick="setBattery(95)">Bat 95%</button>
  <button onclick="setBattery(50)">Bat 50%</button>
  <button onclick="setBattery(15)">Bat 15%</button>
</div>

<div id="log"></div>
<div id="card-container"></div>

<script>
  // Visible logger — shows steps without needing DevTools
  function log(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = type;
    el.textContent = msg;
    document.getElementById('log').appendChild(el);
  }
  window.onerror = (msg, src, line, col, err) => {
    log('Global error: ' + msg + (err ? '\n' + err.stack : ''), 'err');
  };
  window.addEventListener('unhandledrejection', e => {
    log('Unhandled rejection: ' + (e.reason?.stack || e.reason), 'err');
  });

  log('Page loaded');

  // ha-icon stub
  class HaIcon extends HTMLElement {
    static get observedAttributes() { return ['icon']; }
    connectedCallback()        { this._r(); }
    attributeChangedCallback() { this._r(); }
    _r() {
      const name = (this.getAttribute('icon') || '').replace(/^mdi:/, '');
      this.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;';
      this.textContent = name ? `[${name}]` : '';
    }
  }
  if (!customElements.get('ha-icon')) customElements.define('ha-icon', HaIcon);

  class HaCard extends HTMLElement {}
  if (!customElements.get('ha-card')) customElements.define('ha-card', HaCard);

  log('Stubs registered');
</script>

<script type="module">
  const L = (msg, type = 'info') => {
    const el = document.createElement('div');
    el.className = type;
    el.textContent = msg;
    document.getElementById('log').appendChild(el);
  };

  L('Module script started');

  try {
    await import('../dist/tesla-card.js');
    L('dist/tesla-card.js imported', 'ok');
  } catch (e) {
    L('FAILED to import dist/tesla-card.js: ' + (e.stack || e.message), 'err');
    throw e;
  }

  const CAR = 'terrance';

  const states = {
    [`binary_sensor.${CAR}_charging`]:         { state: 'off',          attributes: {} },
    [`binary_sensor.${CAR}_plugged_in`]:        { state: 'off',          attributes: {} },
    [`binary_sensor.${CAR}_parking_brake`]:     { state: 'on',           attributes: {} },
    [`binary_sensor.${CAR}_frunk`]:             { state: 'off',          attributes: {} },
    [`binary_sensor.${CAR}_trunk`]:             { state: 'off',          attributes: {} },
    [`binary_sensor.${CAR}_doors`]:             { state: 'off',          attributes: { driver_front: false, driver_rear: false, passenger_front: false, passenger_rear: false } },
    [`binary_sensor.${CAR}_windows`]:           { state: 'off',          attributes: {} },
    [`binary_sensor.${CAR}_online`]:            { state: 'on',           attributes: {} },
    [`binary_sensor.${CAR}_sentry_mode`]:       { state: 'off',          attributes: {} },
    [`sensor.${CAR}_battery`]:                  { state: '82',           attributes: { unit_of_measurement: '%' } },
    [`sensor.${CAR}_battery_range`]:            { state: '340',          attributes: { unit_of_measurement: 'km' } },
    [`sensor.${CAR}_charging_state`]:           { state: 'Disconnected', attributes: {} },
    [`sensor.${CAR}_charge_rate`]:              { state: '0',            attributes: { unit_of_measurement: 'kW' } },
    [`sensor.${CAR}_charge_limit`]:             { state: '90',           attributes: {} },
    [`sensor.${CAR}_temperature_inside`]:       { state: '21',           attributes: { unit_of_measurement: '°C' } },
    [`sensor.${CAR}_temperature_outside`]:      { state: '14',           attributes: { unit_of_measurement: '°C' } },
    [`sensor.${CAR}_speed`]:                    { state: '0',            attributes: { unit_of_measurement: 'km/h' } },
    [`sensor.${CAR}_odometer`]:                 { state: '18432',        attributes: { unit_of_measurement: 'km' } },
    [`sensor.${CAR}_energy_added`]:             { state: '12.4',         attributes: { added_range: '76' } },
    [`lock.${CAR}_doors`]:                      { state: 'locked',       attributes: {} },
    [`switch.${CAR}_charger`]:                  { state: 'off',          attributes: {} },
    [`switch.${CAR}_sentry_mode`]:              { state: 'off',          attributes: {} },
    [`switch.${CAR}_defrost`]:                  { state: 'off',          attributes: {} },
    [`switch.${CAR}_camp_mode`]:                { state: 'off',          attributes: {} },
    [`switch.${CAR}_dog_mode`]:                 { state: 'off',          attributes: {} },
    [`select.${CAR}_cabin_overheat_protection`]:{ state: 'Off',          attributes: { options: ['Off', 'No A/C', 'On'] } },
    [`number.${CAR}_charge_limit`]:             { state: '90',           attributes: { min: 50, max: 100, step: 1 } },
    [`number.${CAR}_charging_amps`]:            { state: '16',           attributes: { min: 5,  max: 32,  step: 1 } },
    [`select.${CAR}_heated_seat_left`]:         { state: 'Off',          attributes: { options: ['Off', 'Low', 'Medium', 'High'] } },
    [`select.${CAR}_heated_seat_right`]:        { state: 'Off',          attributes: { options: ['Off', 'Low', 'Medium', 'High'] } },
    [`select.${CAR}_heated_seat_rear_left`]:    { state: 'Off',          attributes: { options: ['Off', 'Low', 'Medium', 'High'] } },
    [`select.${CAR}_heated_seat_rear_center`]:  { state: 'Off',          attributes: { options: ['Off', 'Low', 'Medium', 'High'] } },
    [`select.${CAR}_heated_seat_rear_right`]:   { state: 'Off',          attributes: { options: ['Off', 'Low', 'Medium', 'High'] } },
    [`climate.${CAR}_hvac_climate_system`]:     { state: 'off',          attributes: { temperature: 21.5, temperature_unit: '°C', min_temp: 15, max_temp: 28, target_temp_step: 0.5 } },
    [`cover.${CAR}_windows`]:                   { state: 'closed',       attributes: {} },
    [`cover.${CAR}_frunk`]:                     { state: 'closed',       attributes: {} },
    [`cover.${CAR}_charger_door`]:              { state: 'closed',       attributes: {} },
    [`device_tracker.${CAR}_location_tracker`]: { state: 'home',         attributes: { speed: 0 } },
  };

  const SEAT_CYCLE = ['Off', 'Low', 'Medium', 'High'];

  const hass = {
    states,
    async callService(domain, service, data) {
      L(`svc: ${domain}.${service} ${JSON.stringify(data)}`, 'ok');

      // ── Handle select.select_next for seat heaters ──
      if (domain === 'select' && service === 'select_next') {
        const eid = data.entity_id;
        if (eid && states[eid]) {
          const cur = states[eid].state;
          const idx = SEAT_CYCLE.indexOf(cur);
          states[eid].state = SEAT_CYCLE[(idx + 1) % SEAT_CYCLE.length];
          L(`  → ${eid} = ${states[eid].state}`, 'info');
          pushHass();
          return;
        }
      }

      // ── Handle climate.turn_on / turn_off ──
      if (domain === 'climate') {
        const climKey = `climate.${CAR}_hvac_climate_system`;
        if (service === 'turn_on') {
          states[climKey].state = 'heat_cool';
          pushHass(); return;
        }
        if (service === 'turn_off') {
          states[climKey].state = 'off';
          pushHass(); return;
        }
        if (service === 'set_temperature' && data.temperature != null) {
          states[climKey].attributes.temperature = data.temperature;
          pushHass(); return;
        }
      }

      // ── Handle lock/unlock ──
      if (domain === 'lock') {
        const lockKey = `lock.${CAR}_doors`;
        states[lockKey].state = service === 'lock' ? 'locked' : 'unlocked';
        pushHass(); return;
      }

      // ── Handle switch on/off ──
      if (domain === 'switch') {
        const eid = data.entity_id;
        if (eid && states[eid]) {
          states[eid].state = service === 'turn_on' ? 'on' : 'off';
          pushHass(); return;
        }
      }

      // ── Handle cover open/close/toggle ──
      if (domain === 'cover') {
        const eid = data.entity_id;
        if (eid && states[eid]) {
          if (service === 'toggle_cover') {
            states[eid].state = states[eid].state === 'open' ? 'closed' : 'open';
          } else {
            states[eid].state = service === 'open_cover' ? 'open' : 'closed';
          }
          pushHass(); return;
        }
      }

      // ── Handle select.select_option (cabin overheat) ──
      if (domain === 'select' && service === 'select_option') {
        const eid = data.entity_id;
        if (eid && states[eid] && data.option) {
          states[eid].state = data.option;
          pushHass(); return;
        }
      }
    },
  };

  function pushHass() {
    const c = document.querySelector('tesla-card');
    if (c) c.hass = { ...hass, states: { ...states } };
  }

  try {
    L('Waiting for tesla-card to be defined...');

    await Promise.race([
      customElements.whenDefined('tesla-card'),
      new Promise((_, rej) => setTimeout(() => rej(new Error(
        'Timed out waiting for tesla-card.\n' +
        'dist/tesla-card.js likely has an error — check browser console (F12).'
      )), 5000)),
    ]);

    L('tesla-card defined', 'ok');

    const card = document.createElement('tesla-card');
    card.setConfig({
      car_name:    CAR,
      car_model:   '3',
      car_variant: '3.1',
      car_color:   'neutral',
      image_path:  '/dist',
      show_speed:  true,
      name:        'Terrance',
    });
    card.hass = hass;

    document.getElementById('card-container').appendChild(card);
    L('Card mounted', 'ok');
  } catch (err) {
    L('ERROR: ' + (err.stack || err.message || err), 'err');
    console.error(err);
  }

  // ── Toolbar toggle handlers ──

  window.toggle = (what) => {
    const flip = (key) => { states[key].state = states[key].state === 'on' ? 'off' : 'on'; };
    const flipState = (key, a, b) => { states[key].state = states[key].state === a ? b : a; };

    switch (what) {
      case 'charging': {
        const on = states[`binary_sensor.${CAR}_charging`].state === 'off';
        states[`binary_sensor.${CAR}_charging`].state   = on ? 'on' : 'off';
        states[`sensor.${CAR}_charging_state`].state    = on ? 'Charging' : 'Disconnected';
        states[`sensor.${CAR}_charge_rate`].state       = on ? '7.4' : '0';
        states[`binary_sensor.${CAR}_plugged_in`].state = on ? 'on' : 'off';
        break;
      }
      case 'locked':
        flipState(`lock.${CAR}_doors`, 'locked', 'unlocked');
        break;
      case 'online':
        flip(`binary_sensor.${CAR}_online`);
        break;
      case 'plugged':
        flip(`binary_sensor.${CAR}_plugged_in`);
        break;
      case 'frunk':
        flipState(`cover.${CAR}_frunk`, 'closed', 'open');
        flip(`binary_sensor.${CAR}_frunk`);
        break;
      case 'trunk':
        flip(`binary_sensor.${CAR}_trunk`);
        break;
      case 'charger_door':
        flipState(`cover.${CAR}_charger_door`, 'closed', 'open');
        break;
      case 'windows':
        flipState(`cover.${CAR}_windows`, 'closed', 'open');
        flip(`binary_sensor.${CAR}_windows`);
        break;
      case 'door_nf': {
        const d = states[`binary_sensor.${CAR}_doors`].attributes;
        d.driver_front = !d.driver_front;
        states[`binary_sensor.${CAR}_doors`].state = (d.driver_front || d.driver_rear || d.passenger_front || d.passenger_rear) ? 'on' : 'off';
        break;
      }
      case 'door_nr': {
        const d = states[`binary_sensor.${CAR}_doors`].attributes;
        d.driver_rear = !d.driver_rear;
        states[`binary_sensor.${CAR}_doors`].state = (d.driver_front || d.driver_rear || d.passenger_front || d.passenger_rear) ? 'on' : 'off';
        break;
      }
      case 'door_ff': {
        const d = states[`binary_sensor.${CAR}_doors`].attributes;
        d.passenger_front = !d.passenger_front;
        states[`binary_sensor.${CAR}_doors`].state = (d.driver_front || d.driver_rear || d.passenger_front || d.passenger_rear) ? 'on' : 'off';
        break;
      }
      case 'door_fr': {
        const d = states[`binary_sensor.${CAR}_doors`].attributes;
        d.passenger_rear = !d.passenger_rear;
        states[`binary_sensor.${CAR}_doors`].state = (d.driver_front || d.driver_rear || d.passenger_front || d.passenger_rear) ? 'on' : 'off';
        break;
      }
      case 'hvac':
        flipState(`climate.${CAR}_hvac_climate_system`, 'off', 'heat_cool');
        break;
      case 'defrost':
        flip(`switch.${CAR}_defrost`);
        break;
      case 'camp':
        flip(`switch.${CAR}_camp_mode`);
        break;
      case 'dog':
        flip(`switch.${CAR}_dog_mode`);
        break;
      case 'sentry':
        flip(`switch.${CAR}_sentry_mode`);
        flip(`binary_sensor.${CAR}_sentry_mode`);
        break;
      case 'parking':
        flip(`binary_sensor.${CAR}_parking_brake`);
        break;
    }
    pushHass();
    // Sync door button visuals
    const doorState = states[`binary_sensor.${CAR}_doors`].attributes;
    const btnMap = { 'btn-door-nf': doorState.driver_front, 'btn-door-nr': doorState.driver_rear,
                     'btn-door-ff': doorState.passenger_front, 'btn-door-fr': doorState.passenger_rear };
    for (const [id, active] of Object.entries(btnMap)) {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('toggled-on', !!active);
    }
    // Log the combo state filename the card should now use
    const toggleOrder = ['trunk', 'chargeport', 'frunk', 'fr', 'ff', 'nr', 'nf'];
    const active = [];
    if (states[`binary_sensor.${CAR}_trunk`].state === 'on') active.push('trunk');
    if (states[`cover.${CAR}_charger_door`].state === 'open'
        || states[`binary_sensor.${CAR}_plugged_in`].state === 'on') active.push('chargeport');
    if (states[`cover.${CAR}_frunk`].state === 'open'
        || states[`binary_sensor.${CAR}_frunk`].state === 'on') active.push('frunk');
    if (doorState.passenger_rear) active.push('fr');
    if (doorState.passenger_front) active.push('ff');
    if (doorState.driver_rear) active.push('nr');
    if (doorState.driver_front) active.push('nf');
    const comboFile = active.length ? active.join('-') + '.png' : 'base.png';
    L(`Toggled ${what} → states/${comboFile}`, 'ok');
  };

  window.cycleSeat = (pos) => {
    const key = `select.${CAR}_heated_seat_${pos}`;
    const cur = states[key].state;
    const idx = SEAT_CYCLE.indexOf(cur);
    states[key].state = SEAT_CYCLE[(idx + 1) % SEAT_CYCLE.length];
    pushHass();
    L(`Seat ${pos}: ${states[key].state}`, 'ok');
  };

  window.setBattery = (pct) => {
    states[`sensor.${CAR}_battery`].state = String(pct);
    states[`sensor.${CAR}_battery_range`].state = String(Math.round(pct * 4.15));
    pushHass();
    L(`Battery → ${pct}%`, 'ok');
  };
</script>

</body>
</html>
